<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus Notice AI Integration Demo</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body class="demo-body">
    <main class="demo-shell">
      <header class="demo-topbar">
        <div>
          <h1>단국대 앱 연동 예시</h1>
          <p>공식 앱/포털을 복제하지 않은 발표용 mock shell입니다.</p>
        </div>
        <a class="secondary-link" href="/">독립 웹앱 열기</a>
      </header>

      <section class="demo-content">
        <article class="demo-module">
          <h2>오늘의 일정</h2>
          <p>수강 일정, 학사 일정, 비교과 프로그램을 한 화면에서 확인하는 영역입니다.</p>
        </article>
        <article class="demo-module">
          <h2>공지 요약</h2>
          <p>학과, 학년, 수업 context를 기준으로 중요한 공지를 정리하는 영역입니다.</p>
        </article>
        <article class="demo-module">
          <h2>빠른 이동</h2>
          <p>포털, LMS, 학과 홈페이지, 장학 공지로 이동하는 메뉴가 들어갈 수 있습니다.</p>
        </article>
      </section>
    </main>

    <button id="floatingChatButton" class="floating-chat-button" type="button">Notice AI</button>

    <section id="floatingChatPanel" class="floating-chat-panel" aria-live="polite">
      <header class="floating-chat-header">
        <h2>공지 챗봇</h2>
        <button id="floatingCloseButton" type="button">닫기</button>
      </header>
      <div id="widgetMessages" class="chat-messages"></div>
      <form id="widgetForm" class="chatbar">
        <input id="widgetInput" placeholder="공지에 대해 질문하세요" value="장학금 신청 공지 있어?" />
        <button type="submit">질문</button>
      </form>
    </section>

    <script src="/integration-demo.js"></script>
  </body>
</html>
